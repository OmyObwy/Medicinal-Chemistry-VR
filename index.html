<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Medicinal Chemistry VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <a-assets>
      <a-asset-item id="model1" src="4DAJ.glb"></a-asset-item>
      <a-asset-item id="model2" src="1UW6.glb"></a-asset-item>
    </a-assets>

    <!-- First molecule -->
    <a-entity
      gltf-model="#model1"
      position="-2 1 -8"
      scale="1 1 1"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
    </a-entity>

    <!-- Second molecule -->
    <a-entity
      gltf-model="#model2"
      position="2 1 -8"
      scale="1 1 1"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 15000">
    </a-entity>

    <a-sky color="#ECECEC"></a-sky>
    <a-camera position="0 1.6 0"></a-camera>

  </a-scene>
</body>
</html>
